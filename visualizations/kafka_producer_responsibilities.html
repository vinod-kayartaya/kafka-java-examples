
<style>

    background: var(--color-background-secondary);

    font-size: 11px; font-weight: 500; color: var(--color-text-secondary);

    position: relative; z-index: 1;
  }
  .dot.active {
    background: #534AB7; border-color: #534AB7; color: #fff;
    box-shadow: 0 0 0 3px rgba(83,74,183,0.18);

  .dot.done {
    background: var(--color-background-success); border-color: var(--color-border-success);
    color: var(--color-text-success);
  }
  .dot-line {
    flex: 1; height: 0.5px; background: var(--color-border-tertiary); transition: background 0.3s;
  }
  .dot-line.done { background: var(--color-border-success); }

  /* ── main stage card ── */
  .stage-card {
    background: var(--color-background-primary);

    animation: slide-in 0.3s ease;
  }
  .stage-header {

  }
  .stage-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: #EEEDFE; color: #3C3489;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 500; flex-shrink: 0;
  }
  .stage-titles { flex: 1; }
  .stage-name  { font-size: 16px; font-weight: 500; }
  .stage-sub   { font-size: 13px; color: var(--color-text-secondary); margin-top: 1px; }

  /* ── stage body ── */
  .stage-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 240px;
  }
  .stage-viz {
    padding: 1.25rem;

  .code-chip {

  /* ── nav ── */
  .nav {

  .btn-prev { background: none; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); }
  .btn-prev:hover { background: var(--color-background-secondary); }
  .btn-next { background: #534AB7; border: none; color: #fff; }
  .btn-next:hover { background: #3C3489; }
  .btn-next:disabled { opacity: 0.4; cursor: default; background: #534AB7; }
  .btn-prev:disabled { opacity: 0.3; cursor: default; }

  /* ── SVG vizzes ── */
  .viz-svg { width: 100%; max-width: 280px; }

  /* record blocks */

  .brace-appear { animation: pop 0.4s ease both; }

  .ack-appear { animation: pop 0.5s ease both; }

  /* retry counter */
  .retry-num { animation: blink 1s ease-in-out 3; }
</style>

<h2 class="sr-only">Kafka producer responsibilities: an 8-step interactive walkthrough showing how a producer creates, serializes, routes, buffers, batches, sends, retries, and acknowledges messages.</h2>

<div class="root">

  <!-- dot stepper -->
  <div class="dots" id="dots"></div>

  <!-- stage card -->
  <div class="stage-card" id="stage-card">
    <!-- injected by JS -->
  </div>

</div>

<script>
const STAGES = [
  {
    name: "Create records",
    sub: "Build the ProducerRecord with topic, key, value, headers and optional partition",
    icon: "✦",
    info: [
      { key: "ProducerRecord", detail: "wraps topic name, optional key, payload, optional partition override, and headers" },
      { key: "Key", detail: "used for partition routing; messages with the same key always land on the same partition" },
      { key: "Headers", detail: "metadata attached to the record — trace IDs, schema version, content type" },
    ],
    viz: vizCreate,
  },
  {
    name: "Serialize data",
    sub: "Convert key and value objects to byte arrays using configured serializers",
    icon: "⇄",
    info: [
      { key: "Key serializer", detail: "converts the key object to bytes — StringSerializer, LongSerializer, Avro, etc." },
      { key: "Value serializer", detail: "converts the message payload; both sides must match the consumer's deserializer" },
      { key: "Schema registry", detail: "Avro/Protobuf serializers can look up the schema at runtime and embed a schema ID" },
    ],
    viz: vizSerialize,
  },
  {
    name: "Determine partition",
    sub: "Choose which partition the record belongs to using the partitioner",
    icon: "⊸",
    info: [
      { key: "DefaultPartitioner", detail: "if a key is present, uses murmur2(key) % numPartitions — same key → same partition" },
      { key: "Round-robin", detail: "when there is no key, records are distributed evenly across all partitions" },
      { key: "Custom partitioner", detail: "implement Partitioner to route by geography, tenant, message type, or any logic" },
    ],
    viz: vizPartition,
  },
  {
    name: "Buffer records",
    sub: "Accumulate records in an in-memory RecordAccumulator before sending",
    icon: "⊙",
    info: [
      { key: "buffer.memory", detail: "total bytes the producer can hold across all partitions (default 32 MB)" },
      { key: "max.block.ms", detail: "how long send() blocks when the buffer is full before throwing BufferExhaustedException" },
      { key: "Per-partition queue", detail: "each partition has its own deque of ProducerBatch objects inside the accumulator" },
    ],
    viz: vizBuffer,
  },
  {
    name: "Batch messages",
    sub: "Group buffered records into ProducerBatch objects to maximise throughput",
    icon: "⊞",
    info: [
      { key: "batch.size", detail: "when a batch reaches this size (bytes), it is eligible to send (default 16 KB)" },
      { key: "linger.ms", detail: "wait up to this long before sending an incomplete batch — trades latency for throughput" },
      { key: "Compression", detail: "batches are compressed together (snappy / lz4 / zstd) for better wire efficiency" },
    ],
    viz: vizBatch,
  },
  {
    name: "Send to brokers",
    sub: "The Sender thread drains ready batches and transmits them over the network",
    icon: "→",
    info: [
      { key: "Sender thread", detail: "a background I/O thread that runs independently of your application thread" },
      { key: "NetworkClient", detail: "manages TCP connections to each broker; one connection per broker" },
      { key: "In-flight requests", detail: "max.in.flight.requests.per.connection controls pipeline depth (default 5)" },
    ],
    viz: vizSend,
  },
  {
    name: "Retry failed requests",
    sub: "Automatically resend batches that receive an error or timeout response",
    icon: "↺",
    info: [
      { key: "retries", detail: "how many times the producer retransmits before surfacing the error (default 2147483647)" },
      { key: "retry.backoff.ms", detail: "wait between attempts; exponential backoff grows up to retry.backoff.max.ms" },
      { key: "Idempotent producer", detail: "enable.idempotence=true assigns a PID + sequence number so retries never duplicate records" },
    ],
    viz: vizRetry,
  },
  {
    name: "Track acknowledgements",
    sub: "The broker sends an Ack once the record is safely written; the producer confirms delivery",
    icon: "✓",
    info: [
      { key: "acks=0", detail: "fire and forget — no confirmation, highest throughput, possible data loss" },
      { key: "acks=1", detail: "leader writes to disk before confirming — balanced; loss possible if leader fails" },
      { key: "acks=all", detail: "all in-sync replicas confirm — strongest guarantee, recommended for critical data" },
    ],
    viz: vizAck,
  },
];

let current = 0;

/* ── render helpers ──────────────────────────── */
function mkSvg(h, body) {
  return `<svg class="viz-svg" viewBox="0 0 280 ${h}" role="img" aria-hidden="true">${body}</svg>`;
}

function rect(x,y,w,h,cls,rx=6,fill='',extra='') {
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" ${fill?`fill="${fill}"`:'fill="var(--color-background-secondary)"'} stroke="var(--color-border-secondary)" stroke-width="0.5" ${cls?`class="${cls}"`:''}  ${extra}/>`;
}
function txt(x,y,s,anchor='middle',cls='',fill='',dy='') {
  return `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="central" font-family="var(--font-sans,sans-serif)" font-size="${cls==='h'?'13':'11'}" font-weight="${cls==='h'?'500':'400'}" fill="${fill||'var(--color-text-primary)'}" ${dy?`dy="${dy}"`:''}>${s}</text>`;
}
function arr(x1,y1,x2,y2,color='var(--color-border-secondary)') {
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1" marker-end="url(#arh)"/>`;
}

const DEFS = `<defs><marker id="arh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

/* ── stage vizzes ─────────────────────────────── */
function vizCreate() {
  const fields = [
    {l:'topic', v:'"orders"',  c:'#534AB7', tc:'#EEEDFE'},
    {l:'key',   v:'"user-42"', c:'#0F6E56', tc:'#E1F5EE'},
    {l:'value', v:'{...}',     c:'#993C1D', tc:'#FAECE7'},
    {l:'headers',v:'[...]',   c:'#185FA5', tc:'#E6F1FB'},
  ];
  let rows = fields.map((f,i) => {
    const y = 40 + i*40;
    return `<g class="rec" style="animation-delay:${i*0.08}s">
      ${rect(20, y, 240, 30, '', 4, f.tc)}
      ${txt(80, y+15, f.l, 'start', '', f.c)}
      <rect x="125" y="${y+4}" width="1" height="22" fill="${f.c}" opacity="0.3" rx="0"/>
      ${txt(220, y+15, f.v, 'end', '', f.c)}
    </g>`;
  }).join('');

  return mkSvg(220, `${DEFS}
    ${rect(10, 10, 260, 200, '', 8, 'var(--color-background-primary)')}
    ${txt(140, 27, 'ProducerRecord', 'middle', 'h', '#3C3489')}
    <line x1="10" y1="38" x2="270" y2="38" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    ${rows}
  `);
}

function vizSerialize() {
  return mkSvg(200, `${DEFS}
    <g class="rec" style="animation-delay:0s">
      ${rect(20, 20, 110, 44, '', 6, '#EEEDFE')}
      ${txt(75, 36, 'key: String', 'middle', 'h', '#3C3489')}
      ${txt(75, 52, '"user-42"', 'middle', '', '#534AB7')}
    </g>
    <g class="rec" style="animation-delay:0.1s">

    </g>
    <g class="spin-el" style="transform-origin:205px 115px">

    </g>
    <line x1="75"  y1="132" x2="75"  y2="156" stroke="var(--color-border-secondary)" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="205" y1="132" x2="205" y2="156" stroke="var(--color-border-secondary)" stroke-width="1" stroke-dasharray="3 3"/>
    <g class="rec" style="animation-delay:0.3s">

      ${txt(75, 174, '[0x61 0x62 …]', 'middle', '', '#444441')}

    <g class="rec" style="animation-delay:0.4s">

      ${txt(205, 174, '[0x7B 0x61 …]', 'middle', '', '#444441')}

  `);
}

function vizPartition() {
  const parts = [
    {label:'Part 0', color:'#534AB7', bg:'#EEEDFE', pct:70},
    {label:'Part 1', color:'#0F6E56', bg:'#E1F5EE', pct:20},
    {label:'Part 2', color:'#185FA5', bg:'#E6F1FB', pct:10},

  const bars = parts.map((p,i) => {
    const y = 60 + i*48;
    return `<g>
      <text x="20" y="${y+18}" font-size="11" font-family="var(--font-sans,sans-serif)" fill="${p.color}" font-weight="500">${p.label}</text>

    <text x="140" y="24" text-anchor="middle" font-size="11" font-family="var(--font-sans,sans-serif)" fill="var(--color-text-secondary)">murmur2(key) % numPartitions</text>

}

  `);

  const msgs = Array.from({length:4},(_, i)=>{
    const colors=['#534AB7','#0F6E56','#185FA5','#993C1D'];
    const x=38+i*52;
    return `<g class="rec" style="animation-delay:${i*0.1}s">

function vizSend() {
  return mkSvg(200, `${DEFS}
    <text x="140" y="20" text-anchor="middle" font-size="11" font-family="var(--font-sans,sans-serif)" fill="var(--color-text-secondary)">Sender thread → NetworkClient → Broker</text>
    ${rect(10, 32, 80, 52, '', 6, '#EEEDFE')}

    <text x="50" y="68" text-anchor="middle" dominant-baseline="central" font-size="10" font-family="var(--font-sans,sans-serif)" fill="#534AB7">thread</text>

        <rect x="${40+i*38}" y="120" width="30" height="22" rx="4" fill="#534AB7" opacity="${0.15+i*0.12}" stroke="#534AB7" stroke-width="0.5"/>
        <text x="${55+i*38}" y="131" text-anchor="middle" dominant-baseline="central" font-size="9" font-family="var(--font-sans,sans-serif)" fill="#534AB7">req${i+1}</text>

      <text x="140" y="157" text-anchor="middle" font-size="10" font-family="var(--font-sans,sans-serif)" fill="var(--color-text-tertiary)">5 in-flight requests pipelined</text>

/* ── render ───────────────────────────────────── */
function render() {
  const s = STAGES[current];
  // dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = STAGES.map((_, i) => {
    const state = i < current ? 'done' : i === current ? 'active' : '';
    const lineState = i < current ? 'done' : '';
    return `<div class="dot-item">
      <div class="dot ${state}" onclick="goTo(${i})">${i < current ? '✓' : i+1}</div>
      ${i < STAGES.length-1 ? `<div class="dot-line ${lineState}"></div>` : ''}
    </div>`;
  }).join('');

  // card
  const info = s.info.map((it, i) =>
    `<div class="info-item" style="animation-delay:${0.1+i*0.08}s">
      <div class="info-dot"></div>
      <div><span class="info-key">${it.key}:</span>${it.detail}</div>
    </div>`
  ).join('');

  document.getElementById('stage-card').innerHTML = `
    <div class="stage-header">
      <div class="stage-num">${current+1}</div>
      <div class="stage-titles">
        <div class="stage-name">${s.name}</div>
        <div class="stage-sub">${s.sub}</div>
      </div>
    </div>
    <div class="stage-body">
      <div class="stage-viz">${s.viz()}</div>
      <div class="stage-info">${info}</div>
    </div>
    <div class="nav">
      <button class="btn-prev" onclick="prev()" ${current===0?'disabled':''}>← Back</button>
      <span class="nav-label">${current+1} of ${STAGES.length}</span>
      <button class="btn-next" onclick="next()" ${current===STAGES.length-1?'disabled':''}>Next →</button>
    </div>
  `;
}

function next() { if (current < STAGES.length-1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function goTo(i) { current = i; render(); }

render();
</script>
